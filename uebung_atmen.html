<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mastarmind – Atemübung</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #FCF5EC;
  font-family: 'DM Sans', sans-serif;
  color: #262626;
  -webkit-font-smoothing: antialiased;
}
nav {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; align-items: center;
  padding: 24px 48px; z-index: 200;
  background: #FCF5EC;
}
.logo-wrap { cursor: pointer; }
.logo-wrap img { height: 40px; }
.nav-pill {
  margin-left: auto; display: flex; align-items: center;
  border: 1.5px solid #262626; border-radius: 100px; padding: 10px 26px;
}
.nav-pill a { font-size: 16px; color: #262626; text-decoration: none; cursor: pointer; white-space: nowrap; }
.nav-pill a:hover { opacity: 0.4; }
.nav-sep { margin: 0 14px; opacity: 0.3; font-size: 13px; }

.stage {
  position: fixed; top: 88px; left: 0; right: 0; bottom: 0;
  display: flex; align-items: center;
  padding: 0 72px 80px; gap: 60px;
}

/* LEFT */
.left { flex: 0 0 380px; display: flex; flex-direction: column; gap: 24px; }
h1 { font-family: 'Fraunces', serif; font-size: 52px; font-weight: 900; line-height: 1.0; }
.desc { font-size: 18px; line-height: 1.55; max-width: 340px; }
.btn {
  font-family: 'Fraunces', serif; font-size: 20px; font-weight: 700;
  background: transparent; border: 1.5px solid #262626; border-radius: 100px;
  padding: 14px 44px; cursor: pointer; color: #262626;
  align-self: flex-start; transition: background 0.2s, color 0.2s;
}
.btn:hover { background: #262626; color: #FCF5EC; }
#start-btn.hidden { display: none; }
#fertig-btn { display: none; }
#fertig-btn.visible { display: block; }
#phase-label { display: none; }

/* RIGHT: circle display */
.right { flex: 1; display: flex; align-items: center; justify-content: center; }

/*
  Circle system:
  - #base: always the same size, full opacity lila – never changes size
  - #ring1, #ring2: appear on top, scale in/out smoothly
  - All are centered in #circle-container
*/
#circle-container {
  position: relative;
  width: 360px; height: 360px;
  display: flex; align-items: center; justify-content: center;
}

/* Base circle – always visible, always same size */
#base {
  position: absolute;
  width: 200px; height: 200px;
  border-radius: 50%;
  background-color: #8B7FD4;
  z-index: 3;
  display: flex; align-items: center; justify-content: center;
}
#base-label {
  font-family: 'Fraunces', serif;
  font-size: 20px; font-weight: 700;
  color: #262626;
  text-align: center;
  opacity: 0;
  transition: opacity 0.6s ease;
}
#base-label.show { opacity: 1; }

/* Ring 1 – medium ring around base */
#ring1 {
  position: absolute;
  width: 280px; height: 280px;
  border-radius: 50%;
  background: #B0A8E8;
  opacity: 0;
  z-index: 2;
  transition: opacity 0.8s ease, transform 0.8s ease;
  transform: scale(0.85);
}
#ring1.show { opacity: 0.65; transform: scale(1); }

/* Ring 2 – large outer ring */
#ring2 {
  position: absolute;
  width: 340px; height: 340px;
  border-radius: 50%;
  background: #C9C4F0;
  opacity: 0;
  z-index: 1;
  transition: opacity 0.9s ease, transform 0.9s ease;
  transform: scale(0.82);
}
#ring2.show { opacity: 0.45; transform: scale(1); }

/* Ring colors are set directly via JS */
#ring1, #ring2 {
  transition: opacity 0.8s ease, transform 0.8s ease, background-color 0.8s ease;
}
#base { transition: background-color 0.8s ease; }

/* Pulse during halten */
@keyframes gentlePulse {
  0%, 100% { transform: scale(1); }
  50%       { transform: scale(1.04); }
}
#base.pulsing { animation: gentlePulse 2.2s ease-in-out infinite; }



/* PROGRESS BAR */
#progress-bar {
  position: fixed; bottom: 32px; left: 72px; right: 72px;
  height: 4px; background: #26262618; border-radius: 100px;
  z-index: 100; opacity: 0; transition: opacity 0.4s;
}
#progress-fill { height: 100%; background: #262626; border-radius: 100px; width: 0%; }

#skip-btn {
  position: fixed; bottom: 20px; right: 48px;
  font-family: 'DM Sans', sans-serif; font-size: 13px; color: #26262660;
  background: none; border: none; cursor: pointer; text-decoration: underline; z-index: 100;
}
#skip-btn:hover { color: #262626; }
</style>
</head>
<body>
<nav>
  <div class="logo-wrap" onclick="location.href='mastarmind.html'">
    <img src="images/logo.png" alt="Mastarmind">
  </div>
  <div class="nav-pill">
    <a onclick="location.href='mastarmind.html'">Start</a><span class="nav-sep">|</span>
    <a href="uebung_grounding.html?cat=random">Zufällige Übungen</a><span class="nav-sep">|</span>
    <a href="mastarmind.html#kategorien">Kategorien</a><span class="nav-sep">|</span>
    <a href="#">Was ist das?</a>
  </div>
</nav>

<div class="stage">
  <div class="left">
    <h1>Ruhig werden mit Atemübungen!</h1>
    <p class="desc">Atme gemeinsam mit dem lilafarbenen Kreis ein, halte die Luft mit dem pinken und atme mit dem grünen Kreis aus!</p>
    <button class="btn" id="start-btn" onclick="startExercise()">Start</button>
    <button class="btn" id="fertig-btn" onclick="goNext()">Fertig</button>
  </div>

  <div class="right">
    <div id="circle-container">
      <div id="ring2"></div>
      <div id="ring1"></div>
      <div id="base">
        <div id="base-label"></div>
      </div>
    </div>
  </div>
</div>

<div id="progress-bar"><div id="progress-fill"></div></div>
<button id="skip-btn" onclick="goNext()">Übung überspringen</button>

<script>
// 4-7-8: 4s in, 7s hold, 8s out = 19s cycle
const TOTAL_CYCLES = 10;
const CYCLE_MS     = 19000;
const TOTAL_MS     = TOTAL_CYCLES * CYCLE_MS;

let running = false;
let t = null; // current timeout

const base   = document.getElementById('base');
const ring1  = document.getElementById('ring1');
const ring2  = document.getElementById('ring2');
const label  = { classList: { remove: ()=>{}, add: ()=>{} } };
const bLabel = document.getElementById('base-label');

const COLORS = {
  lila:  { base: '#8B7FD4', r1: '#B0A8E8', r2: '#C9C4F0' },
  pink:  { base: '#F0A8CC', r1: '#F5C0D8', r2: '#F9DCE9' },
  gruen: { base: '#A2BF47', r1: '#BDCF7A', r2: '#D4E2A0' },
};

function setColors(scheme) {
  base.style.backgroundColor  = COLORS[scheme].base;
  ring1.style.backgroundColor = COLORS[scheme].r1;
  ring2.style.backgroundColor = COLORS[scheme].r2;
}

function setPhase(name) {
  const container = document.getElementById('circle-container');
  base.classList.remove('pulsing');
  label.classList.remove('show');
  bLabel.classList.remove('show');

  requestAnimationFrame(() => requestAnimationFrame(() => {

    if (name === 'ein1') {
      setColors('lila');
      ring1.classList.remove('show');
      ring2.classList.remove('show');
      bLabel.textContent = 'atme ein'; bLabel.classList.add('show');
      label.textContent  = 'atme ein'; label.classList.add('show');

    } else if (name === 'ein2') {
      setColors('lila');
      ring1.classList.add('show');
      ring2.classList.remove('show');
      bLabel.textContent = 'atme ein'; bLabel.classList.add('show');
      label.textContent  = 'atme ein'; label.classList.add('show');

    } else if (name === 'ein3') {
      setColors('lila');
      ring1.classList.add('show');
      ring2.classList.add('show');
      bLabel.textContent = 'atme ein'; bLabel.classList.add('show');
      label.textContent  = 'atme ein'; label.classList.add('show');

    } else if (name === 'halten') {
      setColors('pink');
      ring1.classList.add('show');
      ring2.classList.add('show');
      base.classList.add('pulsing');
      bLabel.textContent = 'halte'; bLabel.classList.add('show');
      label.textContent  = 'halte'; label.classList.add('show');

    } else if (name === 'aus1') {
      setColors('gruen');
      ring1.classList.add('show');
      ring2.classList.add('show');
      bLabel.textContent = 'atme aus'; bLabel.classList.add('show');
      label.textContent  = 'atme aus'; label.classList.add('show');

    } else if (name === 'aus2') {
      setColors('gruen');
      ring1.classList.add('show');
      ring2.classList.remove('show');
      bLabel.textContent = 'atme aus'; bLabel.classList.add('show');
      label.textContent  = 'atme aus'; label.classList.add('show');

    } else if (name === 'aus3') {
      setColors('gruen');
      ring1.classList.remove('show');
      ring2.classList.remove('show');
      bLabel.textContent = 'atme aus'; bLabel.classList.add('show');
      label.textContent  = 'atme aus'; label.classList.add('show');
    }
  }));
}

// Sequence: ein1(1.33s) → ein2(1.33s) → ein3(1.34s) → halten(7s) → aus1(2.67s) → aus2(2.67s) → aus3(2.66s) → repeat
function runSequence() {
  if (!running) return;

  const steps = [
    { phase: 'ein1',  dur: 1330 },
    { phase: 'ein2',  dur: 1330 },
    { phase: 'ein3',  dur: 1340 },
    { phase: 'halten',dur: 7000 },
    { phase: 'aus1',  dur: 2670 },
    { phase: 'aus2',  dur: 2670 },
    { phase: 'aus3',  dur: 2660 },
  ];

  let delay = 0;
  steps.forEach(step => {
    setTimeout(() => {
      if (!running) return;
      setPhase(step.phase);
    }, delay);
    delay += step.dur;
  });

  // Repeat after full cycle
  t = setTimeout(runSequence, CYCLE_MS);
}

function startExercise() {
  document.getElementById('start-btn').classList.add('hidden');
  document.getElementById('fertig-btn').classList.add('visible');
  document.getElementById('progress-bar').style.opacity = '1';

  running = true;

  const fill = document.getElementById('progress-fill');
  fill.style.transition = 'none';
  fill.style.width = '0%';
  void fill.offsetWidth;
  fill.style.transition = `width ${TOTAL_MS}ms linear`;
  fill.style.width = '100%';

  runSequence();
  setTimeout(finishExercise, TOTAL_MS);
}

function finishExercise() {
  running = false;
  clearTimeout(t);
  base.classList.remove('pulsing');
  ring1.classList.remove('show');
  ring2.classList.remove('show');
  label.classList.remove('show');
  bLabel.classList.remove('show');
  setColors('lila');

  const fill = document.getElementById('progress-fill');
  fill.style.transition = 'width 0.3s ease';
  fill.style.width = '100%';
}


// ── Navigation ──
const _params = new URLSearchParams(location.search);
const _cat  = _params.get('cat')  || 'random';
const _step = parseInt(_params.get('step') || '0');

const _flows = {
  beruhig: ['uebung_atmen.html',     'uebung_ziehenlassen.html'],
  mich:    ['uebung_tapping.html',   'uebung_grounding.html'],
  raus:    ['uebung_wischen.html',   'uebung_schuetteln.html'],
  lass:    ['uebung_kuchen.html',    'uebung_malen.html'],
  random:  ['uebung_grounding.html', 'uebung_wischen.html', 'uebung_atmen.html',
             'uebung_tapping.html',  'uebung_kuchen.html',  'uebung_schuetteln.html',
             'uebung_malen.html',    'uebung_ziehenlassen.html'],
};

function goNext() {
  const flow = _flows[_cat] || _flows['random'];
  const next = _step + 1;
  if (next >= flow.length) {
    location.href = _cat === 'random' ? 'mastarmind.html' : 'mastarmind.html#kategorien';
  } else {
    location.href = flow[next] + '?cat=' + _cat + '&step=' + next;
  }
}

function goPrev() {
  const flow = _flows[_cat] || _flows['random'];
  const prev = _step - 1;
  if (prev < 0) {
    location.href = _cat === 'random' ? 'mastarmind.html' : 'mastarmind.html#kategorien';
  } else {
    location.href = flow[prev] + '?cat=' + _cat + '&step=' + prev;
  }
}
</script>
<button onclick="goPrev()" style="position:fixed;bottom:20px;left:48px;font-family:'DM Sans',sans-serif;font-size:13px;color:#26262660;background:none;border:none;cursor:pointer;text-decoration:underline;z-index:300;" onmouseover="this.style.color='#262626'" onmouseout="this.style.color='#26262660'">← Vorherige Übung</button>
</body>
</html>
