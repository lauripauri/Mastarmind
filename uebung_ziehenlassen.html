<!DOCTYPE html>
<html lang="de">

<meta charset="UTF-8">

<title>Mastarmind – Ziehen lassen</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background-color: #FCF5EC;
  font-family: 'DM Sans', sans-serif;
  color: #262626;
  -webkit-font-smoothing: antialiased;
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; align-items: center;
  padding: 24px 48px;
  z-index: 200;
  background-color: #FCF5EC;
}
.logo-wrap { cursor: pointer; }
.logo-wrap img { height: 40px; width: auto; }
.nav-pill {
  margin-left: auto;
  display: flex; align-items: center;
  border: 1.5px solid #262626;
  border-radius: 100px;
  padding: 10px 26px;
}
.nav-pill a {
  font-size: 16px; color: #262626;
  text-decoration: none; cursor: pointer;
  white-space: nowrap; transition: opacity 0.18s;
}
.nav-pill a:hover { opacity: 0.4; }
.nav-sep { margin: 0 14px; opacity: 0.3; font-size: 13px; }

/* ── SCREENS ── */
.screen {
  position: fixed; inset: 0;
  padding-top: 88px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.6s ease;
}
.screen.active { opacity: 1; pointer-events: all; }

/* ── SCREEN 1 ── */
#screen-intro {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 72px 80px;
}
#screen-intro h1 {
  font-family: 'Fraunces', serif;
  font-size: 64px; font-weight: 900;
  line-height: 1.0; color: #262626;
  margin-bottom: 28px;
}
#screen-intro p {
  font-size: 19px; line-height: 1.55;
  color: #262626; max-width: 440px;
  margin-bottom: 16px;
}
.btn {
  font-family: 'Fraunces', serif;
  font-size: 20px; font-weight: 700;
  background: transparent;
  border: 1.5px solid #262626;
  border-radius: 100px;
  padding: 14px 44px;
  cursor: pointer; color: #262626;
  align-self: flex-start;
  margin-top: 16px;
  transition: background 0.2s, color 0.2s;
}
.btn:hover { background: #262626; color: #FCF5EC; }

/* ── SCREEN 2 ── */
#screen-exercise { overflow: hidden; }

/* Hügel: bottom, full width */
#hill {
  position: absolute;
  bottom: -10px; left: 50%;
  transform: translateX(-50%);
  width: 110%;
  pointer-events: none;
  z-index: 2;
}

/* Clouds */
#clouds-container {
  position: absolute; inset: 0;
  z-index: 3;
  pointer-events: none;
}
.cloud {
  position: absolute;
  pointer-events: all;
  cursor: pointer;
  user-select: none;
}
.cloud img {
  display: block;
  pointer-events: none;
}

/* Sheep */
#sheep {
  position: absolute;
  z-index: 4;
  pointer-events: none;
}
#sheep img {
  display: block;
  width: 88px; height: auto;
}

/* Fertig */
#fertig-btn {
  position: fixed;
  bottom: 28px; left: 50%; transform: translateX(-50%);
  font-family: 'Fraunces', serif;
  font-size: 18px; font-weight: 700;
  background: transparent;
  border: 1.5px solid #262626;
  border-radius: 100px;
  padding: 12px 40px;
  cursor: pointer; color: #262626;
  z-index: 100;
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s, background 0.2s, color 0.2s;
}
#fertig-btn.visible { opacity: 1; pointer-events: all; }
#fertig-btn:hover { background: #262626; color: #FCF5EC; }

/* Skip */
#skip-btn {
  position: fixed;
  bottom: 20px; right: 48px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; color: #26262660;
  background: none; border: none;
  cursor: pointer; text-decoration: underline;
  z-index: 200; transition: color 0.2s;
}
#skip-btn:hover { color: #262626; }
</style>

<body>

<nav>
  <div class="logo-wrap" onclick="location.href='mastarmind.html'">
    <img src="images/logo.png" alt="Mastarmind">
  </div>
  <div class="nav-pill">
    <a onclick="location.href='mastarmind.html'">Start</a><span class="nav-sep">|</span>
    <a href='uebung_grounding.html?cat=random&step=0'>Zufällige Übungen</a><span class="nav-sep">|</span>
    <a href='mastarmind.html#kategorien'>Kategorien</a><span class="nav-sep">|</span>
    <a href="#">Was ist das?</a>
  </div>
</nav>

<!-- SCREEN 1: Intro -->
<div class="screen active" id="screen-intro">
  <h1>Gedanken & Gefühle<br>gehen vorbei!</h1>
  <p>Negative Zustände ziehen vorbei.<br>Wichtig ist, sie anzunehmen und<br>dann gehen zu lassen.</p>
  <p>Zähl die Schafe und lass sie gehen.<br>Stups die Wolken an und werde<br>sanft.</p>
  <button class="btn" onclick="startExercise()">Start</button>
</div>

<!-- SCREEN 2: Exercise -->
<div class="screen" id="screen-exercise">
  <img id="hill" src="images/Hu_gel.png" alt="">
  <div id="clouds-container"></div>
  <div id="sheep"><img src="images/Schaf.png" alt=""></div>
</div>

<button id="fertig-btn" onclick="finishExercise()">Fertig</button>
<button id="skip-btn" onclick="goNext()">Übung überspringen</button>

<script>
const CLOUD_COUNT = 12;
const CLOUD_SIZES = [75, 88, 100, 115, 80]; // random pick
let clouds = [];
let animRunning = false;

// ── SHEEP: one-way right → left, ~2 seconds per crossing ──
let sheepT = 1.0;
const SHEEP_SPEED = 0.008; // 1/125 frames ≈ 2s at 60fps

function sheepPos(t) {
  const W = window.innerWidth;
  const H = window.innerHeight;
  const x = -100 + t * (W + 150);
  const hillY = H * 0.74;
  const peakY = H * 0.60;
  const y = hillY - (hillY - peakY) * Math.sin(t * Math.PI);
  return { x, y };
}

// ── CREATE CLOUDS ──
function createClouds() {
  const container = document.getElementById('clouds-container');
  container.innerHTML = '';
  clouds = [];

  const W = window.innerWidth;
  const H = window.innerHeight;

  for (let i = 0; i < CLOUD_COUNT; i++) {
    const el  = document.createElement('div');
    el.className = 'cloud';
    const img = document.createElement('img');
    const sz  = CLOUD_SIZES[Math.floor(Math.random() * CLOUD_SIZES.length)];
    img.src   = 'images/Wolke.png';
    img.style.width = sz + 'px';
    el.appendChild(img);

    const x = 30 + Math.random() * (W - sz - 60);
    const y = 130 + Math.random() * (H * 0.44);
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
    container.appendChild(el);

    const vx = (0.08 + Math.random() * 0.1) * (Math.random() > 0.5 ? 1 : -1);
    const vy = (0.03 + Math.random() * 0.04) * (Math.random() > 0.5 ? 1 : -1);
    const obj = { el, x, y, vx, vy, sz, ix: 0, iy: 0 };

    // Click: strong flick
    el.addEventListener('click', e => {
      const r  = el.getBoundingClientRect();
      const cx = e.clientX - r.left - r.width / 2;
      const cy = e.clientY - r.top  - r.height / 2;
      const d  = Math.sqrt(cx*cx + cy*cy) || 1;
      obj.ix += (cx / d) * 9;
      obj.iy += (cy / d) * 9;
      obj.vx += (cx / d) * 0.3;
      obj.vy += (cy / d) * 0.3;
    });

    clouds.push(obj);
  }
}

// ── ANIMATION LOOP ──
function loop() {
  if (!animRunning) return;

  const W   = window.innerWidth;
  const H   = window.innerHeight;
  const minY = 130;
  const maxY = H * 0.52;

  // Clouds
  for (let i = 0; i < clouds.length; i++) {
    const c = clouds[i];
    c.ix *= 0.90; c.iy *= 0.90;
    c.x  += c.vx + c.ix;
    c.y  += c.vy + c.iy;

    // Cap speed
    const spd = Math.sqrt(c.vx*c.vx + c.vy*c.vy);
    if (spd > 0.55) { c.vx *= 0.55/spd; c.vy *= 0.55/spd; }

    // Walls
    if (c.x < -c.sz*0.3)      { c.x = -c.sz*0.3;    c.vx =  Math.abs(c.vx); }
    if (c.x > W - c.sz*0.7)   { c.x = W - c.sz*0.7; c.vx = -Math.abs(c.vx); }
    if (c.y < minY)            { c.y = minY;          c.vy =  Math.abs(c.vy); }
    if (c.y > maxY)            { c.y = maxY;          c.vy = -Math.abs(c.vy); }

    // Cloud–cloud repulsion
    for (let j = i + 1; j < clouds.length; j++) {
      const o = clouds[j];
      const dx = (c.x + c.sz/2) - (o.x + o.sz/2);
      const dy = (c.y + c.sz*0.3) - (o.y + o.sz*0.3);
      const dist = Math.sqrt(dx*dx + dy*dy);
      const minDist = (c.sz + o.sz) * 0.6;
      if (dist < minDist && dist > 0) {
        const nx = dx / dist, ny = dy / dist;
        const push = (minDist - dist) * 0.015;
        c.vx += nx * push; c.vy += ny * push;
        o.vx -= nx * push; o.vy -= ny * push;
      }
    }

    c.el.style.left = c.x + 'px';
    c.el.style.top  = c.y + 'px';
  }

  // Sheep: always right → left, reset when off screen
  sheepT -= SHEEP_SPEED;
  if (sheepT <= 0) sheepT = 1.0; // instantly reset to right

  const p = sheepPos(sheepT);
  const sheep = document.getElementById('sheep');
  sheep.style.left = p.x + 'px';
  sheep.style.top  = p.y + 'px';
  sheep.style.transform = 'scaleX(1)'; // always faces left

  requestAnimationFrame(loop);
}

// ── START / FINISH ──
function startExercise() {
  document.getElementById('screen-intro').classList.remove('active');
  document.getElementById('screen-exercise').classList.add('active');
  document.getElementById('fertig-btn').classList.add('visible');
  createClouds();
  animRunning = true;
  sheepT = 1.0;
  requestAnimationFrame(loop);
}

function finishExercise() {
  animRunning = false;
  goNext();
}

// ── Navigation ──
const _params = new URLSearchParams(location.search);
const _cat  = _params.get('cat')  || 'random';
const _step = parseInt(_params.get('step') || '0');
const _flows = {
  beruhig: ['uebung_atmen.html','uebung_ziehenlassen.html'],
  mich:    ['uebung_tapping.html','uebung_grounding.html'],
  raus:    ['uebung_wischen.html','uebung_schuetteln.html'],
  lass:    ['uebung_kuchen.html','uebung_malen.html'],
  random:  ['uebung_grounding.html','uebung_wischen.html','uebung_atmen.html',
             'uebung_tapping.html','uebung_kuchen.html','uebung_schuetteln.html',
             'uebung_malen.html','uebung_ziehenlassen.html'],
};
function goNext() {
  const flow = _flows[_cat] || _flows['random'];
  const next = _step + 1;
  if (next >= flow.length) { location.href = _cat === 'random' ? 'mastarmind.html' : 'mastarmind.html#kategorien'; }
  else { location.href = flow[next] + '?cat=' + _cat + '&step=' + next; }
}
function goPrev() {
  const flow = _flows[_cat] || _flows['random'];
  const prev = _step - 1;
  if (prev < 0) { location.href = _cat === 'random' ? 'mastarmind.html' : 'mastarmind.html#kategorien'; }
  else { location.href = flow[prev] + '?cat=' + _cat + '&step=' + prev; }
}
</script>
<button onclick="location.href='uebung_malen.html'" style="position:fixed;bottom:20px;left:48px;font-family:'DM Sans',sans-serif;font-size:13px;color:#26262660;background:none;border:none;cursor:pointer;text-decoration:underline;z-index:300;" onmouseover="this.style.color='#262626'" onmouseout="this.style.color='#26262660'">← Vorherige Übung</button>
<button onclick="goPrev()" style="position:fixed;bottom:20px;left:48px;font-family:'DM Sans',sans-serif;font-size:13px;color:#26262660;background:none;border:none;cursor:pointer;text-decoration:underline;z-index:300;" onmouseover="this.style.color='#262626'" onmouseout="this.style.color='#26262660'">← Vorherige Übung</button>
